<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="pageHead(title)">
        <meta charset="UTF-8">
        <title th:text="${title}">Orders</title>
        <style>
            body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #222; }
            h1 { font-size: 1.5rem; }
            a { color: #1a6fb5; text-decoration: none; }
            a:hover { text-decoration: underline; }
            table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
            th, td { border: 1px solid #ddd; padding: .5rem .75rem; text-align: left; }
            th { background: #f5f5f5; }
            .toolbar { display: flex; gap: 1rem; align-items: center; margin: 1rem 0; flex-wrap: wrap; }
            .btn { display: inline-block; padding: .4rem .9rem; border: 1px solid #1a6fb5; border-radius: 4px;
                   background: #1a6fb5; color: #fff; cursor: pointer; font-size: .9rem; }
            .btn.secondary { background: #fff; color: #1a6fb5; }
            .badge { padding: .15rem .5rem; border-radius: 4px; font-size: .8rem; background: #eee; }
            .badge.CREATED { background: #e3f0fb; } .badge.PROCESSING { background: #fdf3d7; }
            .badge.COMPLETED { background: #ddf2dd; } .badge.CANCELED { background: #f8dada; }
            .flash { background: #ddf2dd; border: 1px solid #9c9; padding: .5rem .75rem; border-radius: 4px; margin: 1rem 0; }
            .error { color: #b00; font-size: .85rem; }
            input, select { padding: .35rem .5rem; border: 1px solid #bbb; border-radius: 4px; }
            .pager { display: flex; gap: .75rem; align-items: center; }
        </style>
    </th:block>
</head>
<body>
<nav th:fragment="nav" class="toolbar">
    <a th:href="@{/ui/orders}">Заказы</a>
    <a th:href="@{/ui/orders/new}">Новый заказ</a>
    <a th:href="@{/swagger-ui.html}">Swagger UI</a>
</nav>
</body>
</html>
