<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('Новый заказ')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<h1>Новый заказ</h1>

<form method="post" th:action="@{/ui/orders}" th:object="${orderForm}">
    <p>
        <label>Клиент: <input type="text" th:field="*{customerName}" placeholder="Имя клиента"></label>
        <span class="error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></span>
    </p>

    <table id="items">
        <thead>
        <tr><th>Товар</th><th>Количество</th><th>Цена</th></tr>
        </thead>
        <tbody>
        <tr th:each="item, it : *{items}">
            <td>
                <input type="text" th:field="*{items[__${it.index}__].productName}">
                <div class="error" th:if="${#fields.hasErrors('items[__${it.index}__].productName')}"
                     th:errors="*{items[__${it.index}__].productName}"></div>
            </td>
            <td>
                <input type="number" min="1" th:field="*{items[__${it.index}__].quantity}">
                <div class="error" th:if="${#fields.hasErrors('items[__${it.index}__].quantity')}"
                     th:errors="*{items[__${it.index}__].quantity}"></div>
            </td>
            <td>
                <input type="number" step="0.01" min="0" th:field="*{items[__${it.index}__].price}">
                <div class="error" th:if="${#fields.hasErrors('items[__${it.index}__].price')}"
                     th:errors="*{items[__${it.index}__].price}"></div>
            </td>
        </tr>
        </tbody>
    </table>
    <p class="error" th:if="${#fields.hasErrors('items')}" th:errors="*{items}"></p>

    <p class="toolbar">
        <button class="btn secondary" type="button" onclick="addRow()">+ Добавить позицию</button>
        <button class="btn" type="submit">Создать заказ</button>
    </p>
</form>

<script>
    function addRow() {
        const tbody = document.querySelector('#items tbody');
        const i = tbody.rows.length;
        const row = tbody.insertRow();
        row.innerHTML =
            `<td><input type="text" name="items[${i}].productName"></td>
             <td><input type="number" min="1" name="items[${i}].quantity"></td>
             <td><input type="number" step="0.01" min="0" name="items[${i}].price"></td>`;
    }
</script>
</body>
</html>
