<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('Заказы')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<h1>Заказы</h1>

<div th:if="${message}" class="flash" th:text="${message}"></div>

<form class="toolbar" method="get" th:action="@{/ui/orders}">
    <label>Статус:
        <select name="status" onchange="this.form.submit()">
            <option value="" th:selected="${status == null}">— все —</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == status}"></option>
        </select>
    </label>
    <noscript><button class="btn secondary" type="submit">Фильтровать</button></noscript>
</form>

<table>
    <thead>
    <tr><th>ID</th><th>Клиент</th><th>Дата</th><th>Статус</th></tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orders.content}">
        <td><a th:href="@{/ui/orders/{id}(id=${o.id})}" th:text="${o.id}"></a></td>
        <td th:text="${o.customerName}"></td>
        <td th:text="${#temporals.format(o.orderDate, 'dd.MM.yyyy HH:mm')}"></td>
        <td><span class="badge" th:classappend="${o.status}" th:text="${o.status}"></span></td>
    </tr>
    <tr th:if="${orders.empty}"><td colspan="4">Заказов нет</td></tr>
    </tbody>
</table>

<div class="pager">
    <a class="btn secondary" th:if="${orders.hasPrevious()}"
       th:href="@{/ui/orders(status=${status}, page=${orders.number - 1}, size=${orders.size})}">&larr; Назад</a>
    <span th:text="|Страница ${orders.number + 1} из ${orders.totalPages == 0 ? 1 : orders.totalPages}|"></span>
    <a class="btn secondary" th:if="${orders.hasNext()}"
       th:href="@{/ui/orders(status=${status}, page=${orders.number + 1}, size=${orders.size})}">Вперёд &rarr;</a>
</div>
</body>
</html>
